name: Auto Data Preprocessing Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-node-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn

    - name: Run Preprocessing Script
      run: |
        python preprocessing/automate_Fati_Zanolo_Buulolo.py

    - name: Commit and Push Processed Data
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Action Robot"
        git add preprocessing/calories_processed.csv
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Dataset hasil preprocessing terbaru" && git push)